<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spam Email Detection</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="card">

    <h1>📧 Spam Email Detection</h1>

    <p class="subtitle">
        Detect whether an email is Spam or Not Spam using Machine Learning.
    </p>

    <form action="/predict" method="POST">

        <textarea
            name="message"
            placeholder="Paste your email/message here..."
            required>{{ message if message else "" }}</textarea>

        <div class="buttons">
            <button type="submit">Predict</button>
            <button type="reset" class="clear">Clear</button>
        </div>

    </form>

    {% if prediction %}
    <div class="result {{ color }}">
        <h2>{{ prediction }}</h2>
        <p>Confidence : <b>{{ confidence }}%</b></p>
    </div>
    {% endif %}

</div>

</body>
</html>
